name: "Terraform Drift Detection"

# Runs every night at midnight UTC
# Also manually triggerable
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to check for drift"
        required: false
        type: choice
        options:
          - all
          - dev
          - staging
          - prod
        default: all

permissions:
  id-token: write
  contents: read
  issues: write

env:
  TF_VERSION: "1.7.0"
  TF_INPUT: false
  TF_IN_AUTOMATION: true

jobs:
  detect-drift:
    name: "Drift Check [${{ matrix.environment }}]"
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [dev, staging, prod]
    environment: ${{ matrix.environment }}-plan

    steps:
      - name: Skip if single-env dispatch and not this env
        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.environment != 'all' &&
          github.event.inputs.environment != matrix.environment
        run: echo "Skipping ${{ matrix.environment }}" && exit 0

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_{0}', upper(matrix.environment))] }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Terraform Init
        working-directory: infrastructure/envs/${{ matrix.environment }}
        run: terraform init

      - name: Terraform Plan (drift detection)
        id: drift
        working-directory: infrastructure/envs/${{ matrix.environment }}
        run: |
          terraform plan \
            -var-file="terraform.tfvars" \
            -detailed-exitcode \
            2>&1 | tee drift-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Open GitHub Issue on drift detected
        if: steps.drift.outputs.exitcode == '2'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('infrastructure/envs/${{ matrix.environment }}/drift-output.txt', 'utf8');
            const truncated = output.length > 60000
              ? output.slice(0, 60000) + '\n\n... [truncated]'
              : output;

            // Check if drift issue already open
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['terraform-drift', '${{ matrix.environment }}'],
              state: 'open'
            });

            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔀 Terraform Drift Detected — \`${{ matrix.environment }}\` — ${new Date().toISOString().slice(0,10)}`,
                labels: ['terraform-drift', '${{ matrix.environment }}', 'infrastructure'],
                body: [
                  '## Infrastructure Drift Detected',
                  '',
                  `Environment **\`${{ matrix.environment }}\`** has drifted from its Terraform state.`,
                  'Real infrastructure differs from what is defined in code.',
                  '',
                  '### Recommended Actions',
                  '1. Review the plan output below',
                  '2. If drift is intentional: update Terraform code to match and re-apply',
                  '3. If drift is unintentional: investigate who/what changed the resource out-of-band',
                  '4. Apply via the main pipeline to reconcile state',
                  '',
                  '<details><summary>📋 Plan Output (click to expand)</summary>',
                  '',
                  '```hcl',
                  truncated,
                  '```',
                  '',
                  '</details>',
                  '',
                  `*Detected at ${new Date().toUTCString()} by scheduled drift check.*`
                ].join('\n')
              });
            }

      - name: Notify Slack on drift (prod only)
        if: steps.drift.outputs.exitcode == '2' && matrix.environment == 'prod'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🔀 *Infrastructure Drift Detected on `prod`*\nReal infrastructure differs from Terraform state. A GitHub Issue has been opened.\n<${{ github.server_url }}/${{ github.repository }}/issues|View Issues>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Fail job if plan errored (not drift — actual error)
        if: steps.drift.outputs.exitcode == '1'
        run: exit 1